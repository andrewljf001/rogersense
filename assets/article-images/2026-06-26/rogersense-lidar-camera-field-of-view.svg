<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">LiDAR and camera field of view overlap diagram</title>
  <desc id="desc">A top-down diagram showing an industrial robot with LiDAR coverage, camera coverage, overlap zone, and blind zones.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0b1820" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="#061a21"/>
  <rect x="58" y="54" width="1084" height="567" rx="26" fill="#0f172a" stroke="#25414a"/>
  <text x="90" y="108" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#0b1820">Validate coverage before the sensor choice feels final</text>
  <text x="90" y="146" font-family="Inter, Arial, sans-serif" font-size="18" fill="#38bdf8">LiDAR and camera coverage rarely match naturally after mounting, brackets, and enclosure windows are added.</text>

  <g transform="translate(0,18)">
    <path d="M600 333 L250 174 A410 410 0 0 1 950 174 Z" fill="#a3e635" opacity="0.42"/>
    <path d="M600 333 L338 228 A330 330 0 0 1 862 228 Z" fill="#22d3ee" opacity="0.5"/>
    <path d="M600 333 L403 252 A260 260 0 0 1 797 252 Z" fill="#14b8a6" opacity="0.38"/>
    <path d="M600 333 L250 174 A410 410 0 0 1 950 174 Z" fill="none" stroke="#a3e635" stroke-width="4"/>
    <path d="M600 333 L338 228 A330 330 0 0 1 862 228 Z" fill="none" stroke="#22d3ee" stroke-width="4"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="515" y="358" width="170" height="120" rx="22" fill="#0b1820"/>
    <rect x="550" y="332" width="100" height="44" rx="12" fill="#22d3ee"/>
    <circle cx="565" cy="453" r="18" fill="#cbd5e1" stroke="#38bdf8" stroke-width="5"/>
    <circle cx="635" cy="453" r="18" fill="#cbd5e1" stroke="#38bdf8" stroke-width="5"/>
    <text x="550" y="426" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#0f172a">AMR</text>
  </g>

  <g>
    <line x1="290" y1="204" x2="190" y2="204" stroke="#a3e635" stroke-width="3"/>
    <text x="90" y="211" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" fill="#a3e635">LiDAR field</text>
    <text x="90" y="236" font-family="Inter, Arial, sans-serif" font-size="15" fill="#38bdf8">range and geometry</text>
  </g>
  <g>
    <line x1="374" y1="258" x2="190" y2="288" stroke="#22d3ee" stroke-width="3"/>
    <text x="90" y="296" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" fill="#22d3ee">Camera field</text>
    <text x="90" y="321" font-family="Inter, Arial, sans-serif" font-size="15" fill="#38bdf8">visual context</text>
  </g>
  <g>
    <line x1="600" y1="269" x2="600" y2="190" stroke="#22d3ee" stroke-width="3"/>
    <text x="520" y="180" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" fill="#a3e635">Overlap zone</text>
    <text x="486" y="205" font-family="Inter, Arial, sans-serif" font-size="15" fill="#38bdf8">true fusion is possible here</text>
  </g>
  <g>
    <rect x="882" y="420" width="190" height="92" rx="16" fill="#29180d" stroke="#7c2d12"/>
    <text x="910" y="456" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#fb923c">Blind zone risk</text>
    <text x="910" y="484" font-family="Inter, Arial, sans-serif" font-size="15" fill="#38bdf8">mounting and housing can</text>
    <text x="910" y="506" font-family="Inter, Arial, sans-serif" font-size="15" fill="#38bdf8">create hidden gaps</text>
  </g>

  <text x="90" y="572" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#a3e635">Pilot output:</text>
  <text x="205" y="572" font-family="Inter, Arial, sans-serif" font-size="18" fill="#cbd5e1">a coverage map with overlap zones, blind zones, and mounting tolerance.</text>
</svg>
