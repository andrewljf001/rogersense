; Dedicated PHP-FPM pool for the Rogersense forum (Flarum).
; Runs as the project owner so Flarum can write storage/ and public/assets,
; while nginx (www-data) connects to the socket. Isolated from other sites'
; pools (diyinai, mrocioa, default www).
; Installed to /etc/php/8.1/fpm/pool.d/rogersense-forum.conf

[rogersense-forum]
user = mrocioa_andrewljf
group = mrocioa_andrewljf

listen = /run/php/php8.1-fpm-rogersense-forum.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

pm = dynamic
pm.max_children = 10
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 4
pm.max_requests = 500

chdir = /

php_admin_value[upload_max_filesize] = 25M
php_admin_value[post_max_size] = 25M
php_admin_value[memory_limit] = 256M
