<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — Rogersense</title>
  <link rel="stylesheet" href="assets/style.css"/>
</head>
<body>
<nav class="nav">
  <div class="container nav-inner">
    <a href="/" class="nav-logo">
      <span class="nav-logo-name">Rogersense</span>
      <span class="nav-logo-sub">System Solutions</span>
    </a>
    <div></div>
    <div><a href="/" class="btn btn-ghost">← Back to home</a></div>
  </div>
</nav>

<main style="min-height:calc(100vh - 60px);background:var(--color-bg-2);padding:40px 20px;">
  <div class="auth-card" id="auth-card">

    <!-- Sign In view -->
    <div id="view-login">
      <h2>Welcome back</h2>
      <p class="subtitle">Sign in to manage your project briefs.</p>

      <button class="btn btn-github" id="github-login">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.17 6.839 9.49.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836a9.59 9.59 0 012.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.167 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
        </svg>
        Continue with GitHub
      </button>

      <div class="auth-divider"><span>or sign in with email</span></div>

      <div style="display:flex;flex-direction:column;gap:12px;">
        <div class="form-field">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" class="form-input" placeholder="you@company.com"/>
        </div>
        <div class="form-field">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" class="form-input" placeholder="••••••••"/>
        </div>
        <button class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;" id="login-submit">
          Sign in
        </button>
      </div>

      <p id="login-error" style="color:var(--color-accent);font-size:0.825rem;margin-top:10px;display:none;"></p>

      <p class="auth-footer">
        Don't have an account? <a href="#" id="show-register">Create one →</a>
      </p>
    </div>

    <!-- Register view -->
    <div id="view-register" style="display:none;">
      <h2>Create account</h2>
      <p class="subtitle">Submit and track your project briefs.</p>

      <button class="btn btn-github" id="github-register">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.17 6.839 9.49.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836a9.59 9.59 0 012.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.167 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
        </svg>
        Sign up with GitHub
      </button>

      <div class="auth-divider"><span>or sign up with email</span></div>

      <div style="display:flex;flex-direction:column;gap:12px;">
        <div class="form-field">
          <label for="reg-name">Full name</label>
          <input type="text" id="reg-name" class="form-input" placeholder="Jane Smith"/>
        </div>
        <div class="form-field">
          <label for="reg-email">Work email</label>
          <input type="email" id="reg-email" class="form-input" placeholder="jane@company.com"/>
        </div>
        <div class="form-field">
          <label for="reg-password">Password</label>
          <input type="password" id="reg-password" class="form-input" placeholder="At least 8 characters"/>
        </div>
        <button class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;" id="register-submit">
          Create account
        </button>
      </div>

      <p id="register-error" style="color:var(--color-accent);font-size:0.825rem;margin-top:10px;display:none;"></p>

      <p class="auth-footer">
        Already have an account? <a href="#" id="show-login">Sign in →</a>
      </p>
    </div>

  </div>
</main>

<script src="assets/main.js"></script>
<script>
  // Handle GitHub OAuth redirect (?token=...), existing session, or ?error=
  (async () => {
    const params = new URLSearchParams(location.search);
    const incomingToken = params.get('token');
    if (incomingToken) {
      Auth.setToken(incomingToken);
      try { const data = await AuthAPI.me(); if (data?.user) Auth.setUser(data.user); } catch (_) {}
      window.location.href = params.get('redirect') || '/dashboard.html';
      return;
    }
    if (Auth.isLoggedIn()) {
      window.location.href = params.get('redirect') || '/dashboard.html';
      return;
    }
    const oauthError = params.get('error');
    if (oauthError) {
      const el = document.getElementById('login-error');
      el.textContent = oauthError === 'github_not_configured'
        ? 'GitHub sign-in is not configured yet — please use email.'
        : 'GitHub sign-in failed — please use email.';
      el.style.display = 'block';
    }
  })();

  // Toggle views
  document.getElementById('show-register').addEventListener('click', e => {
    e.preventDefault();
    document.getElementById('view-login').style.display = 'none';
    document.getElementById('view-register').style.display = 'block';
  });
  document.getElementById('show-login').addEventListener('click', e => {
    e.preventDefault();
    document.getElementById('view-register').style.display = 'none';
    document.getElementById('view-login').style.display = 'block';
  });

  // GitHub OAuth
  document.getElementById('github-login').addEventListener('click', () => AuthAPI.githubLogin());
  document.getElementById('github-register').addEventListener('click', () => AuthAPI.githubLogin());

  // Login
  document.getElementById('login-submit').addEventListener('click', async () => {
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const errEl    = document.getElementById('login-error');
    if (!email || !password) { errEl.textContent = 'Please fill in all fields.'; errEl.style.display='block'; return; }
    try {
      document.getElementById('login-submit').textContent = 'Signing in…';
      await AuthAPI.login(email, password);
      const params = new URLSearchParams(location.search);
      window.location.href = params.get('redirect') || '/dashboard.html';
    } catch(e) {
      errEl.textContent = e.message || 'Sign in failed. Please try again.';
      errEl.style.display = 'block';
      document.getElementById('login-submit').textContent = 'Sign in';
    }
  });

  // Allow Enter key on login
  ['login-email','login-password'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('login-submit').click();
    });
  });

  // Register
  document.getElementById('register-submit').addEventListener('click', async () => {
    const name     = document.getElementById('reg-name').value.trim();
    const email    = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const errEl    = document.getElementById('register-error');
    if (!name || !email || !password) { errEl.textContent = 'Please fill in all fields.'; errEl.style.display='block'; return; }
    if (password.length < 8) { errEl.textContent = 'Password must be at least 8 characters.'; errEl.style.display='block'; return; }
    try {
      document.getElementById('register-submit').textContent = 'Creating account…';
      await AuthAPI.register(name, email, password);
      const params = new URLSearchParams(location.search);
      window.location.href = params.get('redirect') || '/dashboard.html';
    } catch(e) {
      errEl.textContent = e.message || 'Registration failed. Please try again.';
      errEl.style.display = 'block';
      document.getElementById('register-submit').textContent = 'Create account';
    }
  });
</script>
</body>
</html>
